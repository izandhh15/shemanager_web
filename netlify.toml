# Netlify configuration for VirtuaFC Fútbol Femenino landing page
# The Laravel app runs separately (Laravel Cloud / Railway / etc.)
# Netlify only serves the static landing page.

[build]
  # No build command needed — landing is pure static HTML
  command   = "echo 'Static site — no build required'"
  publish   = "landing/public"
  functions = "landing/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA-style redirects: serve index.html for unknown paths
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# English variant
[[redirects]]
  from   = "/en"
  to     = "/index-en.html"
  status = 200

[[redirects]]
  from   = "/en/*"
  to     = "/index-en.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/*.webm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
